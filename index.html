<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petoi Bittle X — AI Controller</title>
    <meta name="description" content="Voice and camera AI controller for Petoi Bittle X robot dog">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🐾</span>
                <span class="logo-text">Bittle X</span>
                <span class="logo-badge">AI</span>
            </div>
        </div>
        <div class="header-center">
            <div class="mode-toggle">
                <button class="mode-btn active" data-mode="voice" id="btn-voice-mode">
                    <span class="mode-icon">🎤</span>
                    <span>Voice</span>
                </button>
                <button class="mode-btn" data-mode="camera" id="btn-camera-mode">
                    <span class="mode-icon">📷</span>
                    <span>Camera</span>
                </button>
                <button class="mode-btn" data-mode="manual" id="btn-manual-mode">
                    <span class="mode-icon">⌨️</span>
                    <span>Manual</span>
                </button>
                <div class="mode-slider"></div>
            </div>
        </div>
        <div class="header-right">
            <div class="status-indicators">
                <div class="status-dot" id="status-bt">
                    <span class="dot"></span>
                    <span class="status-label" id="status-bt-label">Connecting...</span>
                </div>
            </div>
            <button class="emergency-btn" id="btn-emergency" title="Emergency Stop (Esc)">
                <span>⛔</span> STOP
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Voice Mode Panel -->
        <section class="mode-panel active" id="panel-voice">
            <div class="voice-area">
                <div class="mic-container" id="mic-container">
                    <div class="mic-rings">
                        <div class="mic-ring ring-1"></div>
                        <div class="mic-ring ring-2"></div>
                        <div class="mic-ring ring-3"></div>
                    </div>
                    <button class="mic-btn" id="btn-mic">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </button>
                </div>
                <p class="mic-status" id="mic-status">Click to start listening</p>
                <div class="live-transcript" id="live-transcript"></div>
            </div>

            <!-- Robot Response -->
            <div class="robot-response" id="robot-response">
                <div class="robot-avatar">
                    <span class="robot-emoji" id="robot-emoji">🐕</span>
                </div>
                <div class="response-bubble" id="response-bubble">
                    <p>Ready for your commands! Try saying "walk forward" or "wave hello"</p>
                </div>
            </div>
        </section>

        <!-- Camera Mode Panel -->
        <section class="mode-panel" id="panel-camera">
            <div class="camera-area">
                <div class="camera-container">
                    <video id="camera-feed" autoplay playsinline muted></video>
                    <canvas id="camera-overlay"></canvas>
                    <div class="camera-info">
                        <div class="tracking-status" id="tracking-status">
                            <span class="tracking-dot"></span>
                            <span>No face detected</span>
                        </div>
                    </div>
                </div>
                <div class="camera-controls">
                    <button class="cam-btn" id="btn-start-camera">
                        <span>📷</span> Start Camera
                    </button>
                    <div class="cam-settings">
                        <label class="cam-setting">
                            <span>Tracking Speed</span>
                            <input type="range" id="tracking-speed" min="1" max="10" value="5">
                        </label>
                        <label class="cam-setting">
                            <span>Pan Range</span>
                            <input type="range" id="pan-range" min="20" max="70" value="50">
                        </label>
                        <label class="cam-setting">
                            <span>Tilt Range</span>
                            <input type="range" id="tilt-range" min="15" max="60" value="40">
                        </label>
                    </div>
                </div>
            </div>
            <div class="servo-display">
                <div class="servo-gauge">
                    <span class="servo-label">Pan (L/R)</span>
                    <div class="gauge-bar">
                        <div class="gauge-fill" id="gauge-pan"></div>
                        <div class="gauge-marker" id="gauge-pan-marker"></div>
                    </div>
                    <span class="servo-value" id="servo-pan-value">0°</span>
                </div>
                <div class="servo-gauge">
                    <span class="servo-label">Tilt (U/D)</span>
                    <div class="gauge-bar">
                        <div class="gauge-fill" id="gauge-tilt"></div>
                        <div class="gauge-marker" id="gauge-tilt-marker"></div>
                    </div>
                    <span class="servo-value" id="servo-tilt-value">0°</span>
                </div>
            </div>
        </section>

        <!-- Manual Mode Panel -->
        <section class="mode-panel" id="panel-manual">
            <div class="manual-area">
                <div class="manual-input-row">
                    <input type="text" class="manual-input" id="manual-input" placeholder="Type a command (e.g. ksit, kwkF, m0 30)..." autocomplete="off">
                    <button class="send-btn" id="btn-send-manual">Send</button>
                </div>
                <div class="quick-commands">
                    <h3>Quick Commands</h3>
                    <div class="cmd-grid">
                        <button class="cmd-btn" data-cmd="kbalance">🧍 Stand</button>
                        <button class="cmd-btn" data-cmd="ksit">🪑 Sit</button>
                        <button class="cmd-btn" data-cmd="krest">😴 Rest</button>
                        <button class="cmd-btn" data-cmd="kwkF">🚶 Walk</button>
                        <button class="cmd-btn" data-cmd="ktrF">🏃 Trot</button>
                        <button class="cmd-btn" data-cmd="kcrF">🐛 Crawl</button>
                        <button class="cmd-btn" data-cmd="kbk">⬅️ Backward</button>
                        <button class="cmd-btn" data-cmd="kwkL">↩️ Left</button>
                        <button class="cmd-btn" data-cmd="kwkR">↪️ Right</button>
                        <button class="cmd-btn" data-cmd="khi">👋 Wave</button>
                        <button class="cmd-btn" data-cmd="kpu">💪 Push-up</button>
                        <button class="cmd-btn" data-cmd="kpd">💀 Play Dead</button>
                        <button class="cmd-btn" data-cmd="kjy">🎉 Joy</button>
                        <button class="cmd-btn" data-cmd="kbf">🔄 Backflip</button>
                        <button class="cmd-btn" data-cmd="kpee">🦵 Pee</button>
                        <button class="cmd-btn" data-cmd="kstr">🙆 Stretch</button>
                        <button class="cmd-btn" data-cmd="khlw">🎃 Spooky</button>
                        <button class="cmd-btn" data-cmd="d">⛔ Stop</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Command Log (shared) -->
        <aside class="command-log">
            <div class="log-header">
                <h3>📋 Command Log</h3>
                <button class="log-clear" id="btn-clear-log">Clear</button>
            </div>
            <div class="log-entries" id="log-entries">
                <div class="log-entry log-system">
                    <span class="log-time">--:--</span>
                    <span class="log-msg">System initialized. Waiting for connection...</span>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
